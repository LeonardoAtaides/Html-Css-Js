<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulando</title>

    <style>
    .estilo1{
        background-color: red;
        color: white ;
    }

    .estilo2{
        background-color: blueviolet;
        color: rgb(31, 31, 19);
        width: 400px;
        height: 200px;
        text-align: center;
        padding: 25px;
        align-items: center;
        
    }

   </style>   
   <script>
        function modificaClasse(){
            document.getElementById('mensagem').className = 'estilo2'
        }

   </script> 


</head>

<body style="background: #3f3e3e;">
    <!-- ALTERANDO A COR DE UMA DIV PELO GET ELEMENT-->
    <div id="mensagem" class="estilo1">Modificando a classe do elemento</div>
    <hr>
    <button type="button" onclick="modificaClasse()">Aplicar classe</button>
</html>
