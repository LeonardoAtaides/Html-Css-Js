<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARRAY</title>

    <script>

        var lista_frutas = [];
        lista_frutas[0] = 'Banana'
        lista_frutas[1] = 'Maçã'
        lista_frutas[2] = 'Morango'
        lista_frutas[3] = 'Uva'

        // inclur um elemento no final do array
        lista_frutas.push('Uva')

        // inclur um elemento no início do array
        lista_frutas.unshift('Melão')

        // excluir um elemento no final do array
        lista_frutas.pop()
        

        //excluir elemento do início do array
        lista_frutas.shift()

        console.log(lista_frutas)

    </script>
</head>
<body>
    
</body>
</html>
