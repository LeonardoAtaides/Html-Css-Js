<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <script>
     function modificaEstilo(CordeFundo, width, height){
        document.getElementById('quadrado').style.background = CordeFundo
        document.getElementById('quadrado').style.width = width
        document.getElementById('quadrado').style.height = height
     }
   </script> 
</head>

<body style="background: #3f3e3e;">
    <!-- ALTERANDO A COR DE UMA DIV PELO GET ELEMENT-->
    <h3>
        Manipulando estilo
    </h3>

    <button type="button" onclick="modificaEstilo('#FF0000', '200px', '200px')">Vermelho</button>
    <button type="button" onclick="modificaEstilo('#00FF00','150px', '150px')">Verde</button>
    <button type="button" onclick="modificaEstilo('#0000FF', '50px', '50px' )" >Azul</button>

    <hr>
    <div style="border: solid 1px #000;width: 100px; height: 100px;" id="quadrado"></div>
</body>
</html>
